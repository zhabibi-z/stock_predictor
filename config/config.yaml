data:
  ticker: AAPL
  start: "2015-11-11"
  end: "2025-11-11"

features:
  sma_short: 5
  sma_long: 20
  rsi_window: 14
  bb_window: 20
  bb_std: 2.0
  macd_fast: 12
  macd_slow: 26
  macd_sig: 9
  atr_window: 14
  lag_periods: [1, 2, 5]
  cols:
    - Daily_Return
    - SMA_5
    - SMA_20
    - RSI
    - BB_Pct
    - MACD_Hist
    - ATR_Norm
    - Return_t1
    - Return_t2
    - Return_t5

validation:
  n_splits: 5
  purge_gap: 5

neural_network:
  epochs: 150
  batch_size: 32
  patience: 15

backtest:
  risk_free_rate: 0.04

general:
  random_seed: 42
  plots_dir: plots
